<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXPLAB — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--bg2:#111;--bdr:#222;--tx:#fff;--tx2:#aaa;--tx3:#777;--tx4:#555;--or:#eb6503;--err:#e94560}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Space Grotesk',sans-serif}
body{display:flex;align-items:center;justify-content:center;padding:2rem}
.card{width:100%;max-width:380px;background:var(--bg2);border:1px solid var(--bdr);padding:2.25rem 2rem}
.brand{font-family:'Courier Prime',monospace;font-size:11px;letter-spacing:.22em;color:var(--or);text-transform:uppercase;margin-bottom:.4rem}
h1{font-size:22px;font-weight:700;letter-spacing:-.01em;margin-bottom:1.6rem}
label{display:block;font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--tx3);margin-bottom:.4rem;margin-top:1rem}
input{width:100%;background:transparent;border:1px solid var(--bdr);color:var(--tx);font-family:inherit;font-size:14px;padding:.7rem .85rem;outline:none;transition:border-color .15s}
input:focus{border-color:var(--or)}
.btn{width:100%;margin-top:1.5rem;padding:.85rem;background:var(--or);color:#000;border:none;font-family:inherit;font-weight:700;font-size:13px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:filter .15s}
.btn:hover{filter:brightness(1.08)}
.btn:disabled{opacity:.5;cursor:default}
.row{display:flex;justify-content:space-between;align-items:center;margin-top:1.1rem;font-size:12px}
.row a{color:var(--tx2);text-decoration:none;border-bottom:1px solid var(--bdr)}
.row a:hover{color:var(--or);border-color:var(--or)}
.msg{margin-top:1rem;font-size:12px;line-height:1.5;min-height:1em}
.msg.err{color:var(--err)}
.msg.ok{color:#3feb03}
.foot{margin-top:1.6rem;padding-top:1.2rem;border-top:1px solid var(--bdr);font-size:12px;color:var(--tx3);text-align:center}
.foot a{color:var(--or);text-decoration:none}
.foot a:hover{text-decoration:underline}
.back{position:fixed;top:1.2rem;left:1.2rem;font-size:11px;color:var(--tx3);text-decoration:none;letter-spacing:.1em;text-transform:uppercase}
.back:hover{color:var(--tx)}
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="auth.js"></script>
</head>
<body>
<a class="back" href="index.html">← Home</a>
<div class="card">
  <div class="brand">EXPLAB</div>
  <h1>Sign in</h1>

  <form id="loginForm" autocomplete="on">
    <label for="email">Email</label>
    <input id="email" type="email" autocomplete="email" required>
    <label for="password">Password</label>
    <input id="password" type="password" autocomplete="current-password" required>
    <button class="btn" type="submit" id="submitBtn">Sign in →</button>
    <div class="msg" id="msg"></div>
    <div class="row">
      <a href="#" id="forgot">Forgot password?</a>
      <span style="color:var(--tx4)">·</span>
      <a href="register.html">Create account</a>
    </div>
  </form>

  <div class="foot">
    Already a member without an account? <a href="register.html">Register with the email you gave us</a>.
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
const next = params.get('next') || 'index.html';

const form = document.getElementById('loginForm');
const msg = document.getElementById('msg');
const btn = document.getElementById('submitBtn');

ExplabAuth.init();

// If already signed in, skip the form.
firebase.auth().onAuthStateChanged(u => {
  if (u && location.search.includes('next=')) location.replace(decodeURIComponent(next));
});

form.addEventListener('submit', async e => {
  e.preventDefault();
  msg.className = 'msg';
  msg.textContent = '';
  btn.disabled = true;
  btn.textContent = 'Signing in…';
  try {
    const email = document.getElementById('email').value.trim();
    const pass  = document.getElementById('password').value;
    await ExplabAuth.signIn(email, pass);
    location.replace(decodeURIComponent(next));
  } catch (err) {
    msg.className = 'msg err';
    msg.textContent = friendly(err);
    btn.disabled = false;
    btn.textContent = 'Sign in →';
  }
});

document.getElementById('forgot').addEventListener('click', async e => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  if (!email) {
    msg.className = 'msg err';
    msg.textContent = 'Enter your email above first, then click Forgot.';
    return;
  }
  try {
    await ExplabAuth.sendPasswordReset(email);
    msg.className = 'msg ok';
    msg.textContent = 'Reset link sent. Check your inbox.';
  } catch (err) {
    msg.className = 'msg err';
    msg.textContent = friendly(err);
  }
});

function friendly(err) {
  const code = (err && err.code) || '';
  if (code === 'auth/invalid-email') return 'That email looks invalid.';
  if (code === 'auth/user-not-found') return 'No account with that email. Register first.';
  if (code === 'auth/wrong-password' || code === 'auth/invalid-credential') return 'Wrong email or password.';
  if (code === 'auth/too-many-requests') return 'Too many attempts. Wait a moment.';
  if (code === 'auth/network-request-failed') return 'Network problem. Try again.';
  return (err && err.message) || 'Something went wrong.';
}
</script>
</body>
</html>
